<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Google</title>
    <!-- Google Material Design 图标库 (Web Fonts + Icons) -->
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0,1" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #202124;
            font-family: 'Google Sans', 'Roboto', Arial, sans-serif;
            color: #e8eaed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
        }

        /* 顶部导航栏 - Google 风格 */
        .top-bar {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 12px 24px;
            position: fixed;
            top: 0;
            right: 0;
            z-index: 100;
            background: transparent;
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(48, 49, 52, 0.8);
            backdrop-filter: blur(8px);
            padding: 6px 16px 6px 12px;
            border-radius: 32px;
            border: 1px solid #5f6368;
            transition: all 0.2s;
        }

        .user-menu:hover {
            background: #3c4043;
            border-color: #8ab4f8;
        }

        .user-avatar {
            background: #8ab4f8;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #202124;
            font-weight: 500;
            font-size: 14px;
        }

        .user-name {
            font-size: 14px;
            font-weight: 500;
            color: #e8eaed;
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .auth-btn {
            background: transparent;
            border: none;
            color: #e8eaed;
            font-family: 'Google Sans', 'Roboto', sans-serif;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }

        .auth-btn:hover {
            background: rgba(232, 234, 237, 0.1);
        }

        .logout-btn {
            background: #303134;
            border: 1px solid #5f6368;
        }

        .logout-btn:hover {
            background: #3c4043;
        }

        /* 主容器 */
        .main-wrapper {
            flex: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: 60px;
        }

        /* 搜索首页容器 */
        .home-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 584px;
            margin: 0 auto;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }

        /* Logo 区域 */
        .logo-area {
            margin-bottom: 32px;
            text-align: center;
        }

        .google-logo {
            width: 290px;
            height: auto;
            object-fit: contain;
        }

        /* 搜索框 Material 风格 */
        .search-box {
            margin-top: 10px;
            width: 500px;
            height: 50px;
            background: #303134;
            border: 1px solid #5f6368;
            border-radius: 45px;
            display: flex;
            align-items: center;
            padding: 8px 16px;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            margin-bottom: 38px;
            box-shadow: none;
        }

        .search-box:hover, .search-box:focus-within {
            background-color: #303134;
            border-color: #8ab4f8;
            box-shadow: 0 1px 6px rgba(0,0,0,0.3);
        }

        .search-icon {
            color: #9aa0a6;
            font-size: 24px;
            margin-right: 12px;
            user-select: none;
        }

        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            font-size: 16px;
            font-weight: 400;
            color: #e8eaed;
            font-family: 'Google Sans', 'Roboto', Arial, sans-serif;
            padding: 12px 0;
        }

        .search-input::placeholder {
            color: #9aa0a6;
        }

        /* 按钮组 */
        .button-group {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .md-button {
            background-color: #303134;
            border: 1px solid #5f6368;
            color: #e8eaed;
            font-family: 'Google Sans', 'Roboto', sans-serif;
            font-size: 14px;
            font-weight: 500;
            padding: 10px 20px;
            border-radius: 22px;
            cursor: pointer;
            transition: background-color 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .md-button:hover {
            background-color: #3c4043;
            border-color: #5f6368;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        /* 网站链接按钮组 */
        .sites-section {
            margin: 24px 0 16px;
            text-align: center;
            width: 100%;
        }

        .section-label {
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.25px;
            color: #9aa0a6;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .chip-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .site-chip {
            background: #303134;
            border-radius: 30px;
            padding: 8px 18px;
            font-size: 14px;
            font-weight: 500;
            font-family: 'Google Sans', 'Roboto', sans-serif;
            color: #e8eaed;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s, transform 0.1s;
            border: 1px solid #5f6368;
        }

        .site-chip:hover {
            background-color: #3c4043;
            border-color: #8ab4f8;
        }

        .material-symbols-outlined {
            font-size: 18px;
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 20;
        }

        /* 底部 footer */
        .footer {
            width: 100%;
            background-color: #171717;
            border-top: 1px solid #3c4043;
            padding: 16px 24px;
            font-size: 12px;
            color: #9aa0a6;
            text-align: center;
            margin-top: 40px;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 28px;
            flex-wrap: wrap;
        }

        .footer-links a {
            color: #9aa0a6;
            text-decoration: none;
            font-size: 12px;
            font-weight: 500;
        }

        .footer-links a:hover {
            text-decoration: underline;
            color: #8ab4f8;
        }

        /* 动画 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px);}
            to { opacity: 1; transform: translateY(0);}
        }

        /* 灰色弹窗 (Google Material 风格 Dialog) */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.2s ease;
        }

        .login-modal {
            background-color: #2d2e32;
            border-radius: 28px;
            width: 90%;
            max-width: 420px;
            padding: 28px 24px 32px;
            box-shadow: 0 19px 38px rgba(0,0,0,0.3);
            border: 1px solid #5f6368;
        }

        .login-modal h2 {
            font-size: 24px;
            font-weight: 500;
            margin-bottom: 8px;
            color: #e8eaed;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .login-modal .sub {
            color: #9aa0a6;
            font-size: 14px;
            margin-bottom: 28px;
            border-left: 3px solid #8ab4f8;
            padding-left: 12px;
        }

        .input-group {
            margin-bottom: 24px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #e8eaed;
            margin-bottom: 8px;
        }

        .material-input {
            width: 100%;
            background: #202124;
            border: 1px solid #5f6368;
            border-radius: 24px;
            padding: 12px 18px;
            font-size: 15px;
            color: #e8eaed;
            font-family: 'Google Sans', 'Roboto', sans-serif;
            transition: all 0.2s;
            outline: none;
        }

        .material-input:focus {
            border-color: #8ab4f8;
            box-shadow: 0 1px 4px rgba(138, 180, 248, 0.2);
        }

        .login-btn {
            width: 100%;
            background-color: #8ab4f8;
            border: none;
            border-radius: 28px;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Google Sans', 'Roboto', sans-serif;
            color: #202124;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .login-btn:hover {
            background-color: #aec9fa;
        }

        .error-msg {
            color: #f28b82;
            font-size: 12px;
            margin-top: 12px;
            text-align: center;
            font-weight: 500;
        }

        /* 欢迎弹窗 */
        .welcome-modal {
            background-color: #2d2e32;
            border-radius: 28px;
            max-width: 360px;
            width: 90%;
            padding: 28px 24px;
            text-align: center;
            border: 1px solid #5f6368;
        }

        .welcome-modal h3 {
            font-size: 22px;
            font-weight: 500;
            margin: 16px 0 12px;
            color: #e8eaed;
        }

        .welcome-btn {
            background-color: #8ab4f8;
            border: none;
            border-radius: 28px;
            padding: 10px 24px;
            font-weight: 500;
            cursor: pointer;
            color: #202124;
        }

        /* 协议弹窗 - 必须 Accept All */
        .consent-modal {
            background-color: #2d2e32;
            border-radius: 28px;
            max-width: 480px;
            width: 90%;
            padding: 32px 28px;
            text-align: center;
            border: 1px solid #5f6368;
        }

        .consent-modal h2 {
            font-size: 24px;
            font-weight: 500;
            margin-bottom: 16px;
            color: #e8eaed;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .consent-content {
            text-align: left;
            background: #202124;
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            max-height: 300px;
            overflow-y: auto;
            font-size: 13px;
            color: #e8eaed;
            line-height: 1.5;
        }

        .consent-content p {
            margin-bottom: 12px;
        }

        .consent-buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-top: 8px;
        }

        .consent-accept {
            background-color: #8ab4f8;
            border: none;
            border-radius: 28px;
            padding: 12px 28px;
            font-weight: 600;
            cursor: pointer;
            color: #202124;
            font-size: 14px;
        }

        .consent-reject {
            background-color: #303134;
            border: 1px solid #5f6368;
            border-radius: 28px;
            padding: 12px 28px;
            font-weight: 500;
            cursor: pointer;
            color: #e8eaed;
            font-size: 14px;
        }

        .consent-reject:hover {
            background-color: #3c4043;
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .google-logo {
                width: 180px;
            }
            .home-container {
                padding: 16px;
            }
            .search-box {
                width: 100%;
            }
            .user-name {
                display: none;
            }
            .top-bar {
                padding: 8px 16px;
            }
        }
    </style>
</head>

<script>
    // ======================= 配置常量 =======================
    const VALID_CREDENTIALS = {
        "admin123": "666666",
        "dzpdhpn666": "1j3k8e"
    };
    const STORAGE_KEY_AUTH = "google_dark_auth";
    const STORAGE_KEY_CONSENT = "google_consent_accepted";
    const JIANGSU_ANTI_FRAUD_URL = "http://www.js96110.com.cn/"; 
    
    // 辅助函数
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // 获取登录用户
    function getLoggedInUser() {
        const data = localStorage.getItem(STORAGE_KEY_AUTH);
        if (data) {
            try {
                const parsed = JSON.parse(data);
                if (parsed && parsed.username) return parsed.username;
            } catch(e) {}
        }
        return null;
    }
    
    // 设置登录状态
    function setLoggedInUser(username) {
        localStorage.setItem(STORAGE_KEY_AUTH, JSON.stringify({ username: username, timestamp: Date.now() }));
    }
    
    // 清除登录
    function clearLoggedInUser() {
        localStorage.removeItem(STORAGE_KEY_AUTH);
    }
    
    // 获取协议同意状态
    function hasAcceptedConsent() {
        return localStorage.getItem(STORAGE_KEY_CONSENT) === "true";
    }
    
    // 设置同意协议
    function setConsentAccepted() {
        localStorage.setItem(STORAGE_KEY_CONSENT, "true");
    }
    
    // 跳转江苏反诈网（清除页面内容并跳转）
    function redirectToAntiFraud() {
        // 清除页面所有内容并强制跳转
        document.body.innerHTML = '<div style="background:#202124; height:100vh; display:flex; align-items:center; justify-content:center; color:white;">正在跳转...</div>';
        window.location.href = JIANGSU_ANTI_FRAUD_URL;
    }
    
    // 显示协议弹窗（必须 Accept All）
    function showConsentModal() {
        return new Promise((resolve) => {
            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay';
            overlay.style.zIndex = '2000';
            
            const modal = document.createElement('div');
            modal.className = 'consent-modal';
            modal.innerHTML = `
                <h2>
                    <span class="material-symbols-outlined" style="font-size:32px;">policy</span>
                    用户协议与隐私条款
                </h2>
                <div class="consent-content">
                    <p><strong>欢迎使用 Google 深色搜索服务</strong></p>
                    <p>请您仔细阅读以下协议内容：</p>
                    <p>1. 本服务遵守当地法律法规，所有搜索请求通过隐私代理转发，保护您的个人信息。</p>
                    <p>2. 您确认已年满18周岁，并对使用本平台的所有行为负责。</p>
                    <p>3. 禁止利用本服务进行任何违法、侵权或危害国家安全的行为。</p>
                    <p>4. 本服务使用本地存储记录登录状态和偏好设置，不会收集您的隐私数据。</p>
                    <p>5. 若不同意本协议，您将无法使用本网站并会被重定向至官方合规页面。</p>
                    <p style="margin-top:16px; color:#8ab4f8;"><strong>⚠️ 重要提示：必须点击“Accept All”接受所有条款方可继续使用。</strong></p>
                </div>
                <div class="consent-buttons">
                    <button id="consentAcceptBtn" class="consent-accept">✓ Accept All</button>
                    <button id="consentRejectBtn" class="consent-reject">✗ Reject</button>
                </div>
            `;
            
            overlay.appendChild(modal);
            document.body.appendChild(overlay);
            
            const acceptBtn = document.getElementById('consentAcceptBtn');
            const rejectBtn = document.getElementById('consentRejectBtn');
            
            const cleanup = () => {
                if (overlay && overlay.parentNode) overlay.remove();
            };
            
            acceptBtn.addEventListener('click', () => {
                setConsentAccepted();
                cleanup();
                resolve(true);
            });
            
            rejectBtn.addEventListener('click', () => {
                cleanup();
                redirectToAntiFraud();
                resolve(false);
            });
        });
    }
    
    // 显示登录弹窗
    function showLoginModal(onSuccess) {
        if (document.querySelector('.modal-overlay')) return;
        
        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        
        const modal = document.createElement('div');
        modal.className = 'login-modal';
        modal.innerHTML = `
            <h2>
                <span class="material-symbols-outlined" style="font-size:28px;">account_circle</span>
                登录账号
            </h2>
            <div class="sub">使用 Google 风格凭据登录</div>
            <div class="input-group">
                <label>用户名</label>
                <input type="text" id="loginUsername" class="material-input" placeholder="请输入用户名" autocomplete="off">
            </div>
            <div class="input-group">
                <label>密码</label>
                <input type="password" id="loginPassword" class="material-input" placeholder="请输入密码" autocomplete="off">
            </div>
            <button id="submitLoginBtn" class="login-btn">
                <span class="material-symbols-outlined">login</span> 登录
            </button>
            <div id="loginErrorMsg" class="error-msg"></div>
        `;
        
        overlay.appendChild(modal);
        document.body.appendChild(overlay);
        
        const usernameInput = document.getElementById('loginUsername');
        const passwordInput = document.getElementById('loginPassword');
        const submitBtn = document.getElementById('submitLoginBtn');
        const errorDiv = document.getElementById('loginErrorMsg');
        
        if (usernameInput) usernameInput.focus();
        
        function attemptLogin() {
            const username = usernameInput ? usernameInput.value.trim() : '';
            const password = passwordInput ? passwordInput.value : '';
            
            if (!username || !password) {
                errorDiv.innerText = '请填写用户名和密码';
                return;
            }
            
            const expectedPassword = VALID_CREDENTIALS[username];
            if (expectedPassword && expectedPassword === password) {
                setLoggedInUser(username);
                overlay.remove();
                showWelcomeModal(username);
                if (onSuccess) onSuccess(username);
                updateUserMenu();
            } else {
                errorDiv.innerText = '用户名或密码错误，请重试';
                if (passwordInput) passwordInput.value = '';
                if (usernameInput) usernameInput.focus();
            }
        }
        
        submitBtn.addEventListener('click', attemptLogin);
        const handleKeyPress = (e) => { if (e.key === 'Enter') attemptLogin(); };
        if (usernameInput) usernameInput.addEventListener('keypress', handleKeyPress);
        if (passwordInput) passwordInput.addEventListener('keypress', handleKeyPress);
    }
    
    // 显示欢迎弹窗
    function showWelcomeModal(username) {
        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        overlay.style.zIndex = '1001';
        
        const welcomeCard = document.createElement('div');
        welcomeCard.className = 'welcome-modal';
        welcomeCard.innerHTML = `
            <span class="material-symbols-outlined" style="font-size:52px; color:#8ab4f8;">celebration</span>
            <h3>欢迎回来，${escapeHtml(username)}</h3>
            <p>您已安全登录，享受 Google 深色搜索体验。</p>
            <button id="closeWelcomeBtn" class="welcome-btn">继续探索</button>
        `;
        
        overlay.appendChild(welcomeCard);
        document.body.appendChild(overlay);
        
        const closeBtn = document.getElementById('closeWelcomeBtn');
        const closeModal = () => { if (overlay && overlay.parentNode) overlay.remove(); };
        if (closeBtn) closeBtn.addEventListener('click', closeModal);
        overlay.addEventListener('click', (e) => { if (e.target === overlay) closeModal(); });
        
        setTimeout(() => { if (overlay && overlay.parentNode) closeModal(); }, 4000);
    }
    
    // 更新右上角菜单 (登录/退出按钮)
    function updateUserMenu() {
        const container = document.getElementById('userMenuContainer');
        if (!container) return;
        const loggedUser = getLoggedInUser();
        
        if (loggedUser) {
            container.innerHTML = `
                <div class="user-menu">
                    <div class="user-avatar">${escapeHtml(loggedUser.charAt(0).toUpperCase())}</div>
                    <span class="user-name">${escapeHtml(loggedUser)}</span>
                    <button id="logoutHeaderBtn" class="auth-btn logout-btn">
                        <span class="material-symbols-outlined" style="font-size:18px;">logout</span>
                        退出
                    </button>
                </div>
            `;
            const logoutBtn = document.getElementById('logoutHeaderBtn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', () => {
                    clearLoggedInUser();
                    updateUserMenu();
                    // 可选刷新页面或保持，用户退出后不再自动弹登录，保留界面但搜索会被拦截重新登录
                });
            }
        } else {
            container.innerHTML = `
                <button id="loginHeaderBtn" class="auth-btn">
                    <span class="material-symbols-outlined" style="font-size:18px;">login</span>
                    登录
                </button>
            `;
            const loginBtn = document.getElementById('loginHeaderBtn');
            if (loginBtn) {
                loginBtn.addEventListener('click', () => {
                    showLoginModal(() => updateUserMenu());
                });
            }
        }
    }
    
    // 拦截搜索与手气不错，要求登录
    function initInteractions() {
        const searchForm = document.getElementById('searchForm');
        const searchInput = document.querySelector('.search-input');
        const luckyBtn = document.getElementById('luckyBtn');
        
        if (searchForm) {
            searchForm.addEventListener('submit', (e) => {
                const loggedUser = getLoggedInUser();
                if (!loggedUser) {
                    e.preventDefault();
                    if (!document.querySelector('.modal-overlay')) showLoginModal(() => updateUserMenu());
                    return false;
                }
                let query = searchInput.value.trim();
                if (query === "") {
                    e.preventDefault();
                    searchInput.style.borderBottom = "1px solid #f28b82";
                    searchInput.placeholder = "请输入搜索内容";
                    setTimeout(() => {
                        searchInput.style.borderBottom = "";
                        searchInput.placeholder = "在 Google 中搜索";
                    }, 1500);
                    return false;
                }
                return true;
            });
        }
        
        if (luckyBtn) {
            luckyBtn.addEventListener('click', (e) => {
                e.preventDefault();
                const loggedUser = getLoggedInUser();
                if (!loggedUser) {
                    if (!document.querySelector('.modal-overlay')) showLoginModal(() => updateUserMenu());
                    return;
                }
                const luckyKeywords = [
                    "Google Material Design", "Open source intelligence", "Web development trends",
                    "Internet privacy", "Google fonts", "Startpage privacy",
                    "Artificial Intelligence", "Space exploration news"
                ];
                const randomKeyword = luckyKeywords[Math.floor(Math.random() * luckyKeywords.length)];
                if (searchInput) searchInput.value = randomKeyword;
                searchForm.submit();
            });
        }
    }
    
    // 初始化: 协议检查 -> 然后加载页面功能
    async function init() {
        // 1. 检查是否已同意协议
        if (!hasAcceptedConsent()) {
            await showConsentModal();
            // 如果 reject 会跳转，不会继续执行；若 accept 则继续
        }
        // 2. 渲染顶部菜单
        updateUserMenu();
        // 3. 绑定搜索交互
        initInteractions();
        // 4. 若已登录，不再弹窗，若未登录，也不自动弹登录框，由用户主动点击登录按钮
        // 完全符合: 进网站先有协议，必须 accept all，否则跳转反诈网。
    }
    
    init();
</script>
</body>
</html>
