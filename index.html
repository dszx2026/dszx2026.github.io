<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Google</title>
    <!-- Google Material Design 图标库 -->
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0,1" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 启动封面层 - 全屏居中显示指定图片 */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #202124;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        
        .splash-content {
            text-align: center;
            animation: fadeInUp 0.6s ease;
        }
        
        .splash-logo {
            width: 200px;
            height: 200px;
            object-fit: contain;
            border-radius: 32px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
        }
        
        .splash-logo:hover {
            transform: scale(1.02);
        }
        
        .splash-text {
            margin-top: 24px;
            font-size: 18px;
            font-weight: 500;
            color: #e8eaed;
            font-family: 'Google Sans', 'Roboto', sans-serif;
            letter-spacing: 0.5px;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* 启动封面隐藏后主内容可见 */
        .main-content {
            opacity: 0;
            transition: opacity 0.4s ease;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }
        
        .main-content.visible {
            opacity: 1;
        }
        
        body {
            font-family: 'Google Sans', 'Roboto', Arial, sans-serif;
            color: #e8eaed;
            min-height: 100vh;
            position: relative;
        }
        
        /* 动态背景容器 - 高清无模糊，保持原图清晰度 */
        .dynamic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background-color: #202124;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 0.3s ease;
            /* 确保图片以原始清晰度显示，无任何模糊处理 */
            image-rendering: auto;
        }
        
        /* 背景遮罩 - 只做半透明暗化，移除模糊滤镜，防止壁纸变糊 */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.05);
            z-index: -1;
            /* 关键修改：移除 backdrop-filter: blur(2px); 防止壁纸模糊 */
        }
        
        .main-wrapper {
            flex: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .home-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 584px;
            margin: 0 auto;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }
        
        .logo-area {
            margin-bottom: 32px;
            text-align: center;
        }
        
        .google-logo {
            margin-top: 20%;
            width: 290px;
            height: auto;
            object-fit: contain;
        }
        
        .search-box {
            margin-top: 10px;
            width: 500px;
            height: 50px;
            background: #303134;
            border: 1px solid #5f6368;
            border-radius: 45px;
            display: flex;
            align-items: center;
            padding: 8px 16px;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            margin-bottom: 38px;
            box-shadow: none;
        }
        
        .search-box:hover, .search-box:focus-within {
            background-color: #303134;
            border-color: #8ab4f8;
            box-shadow: 0 1px 6px rgba(0,0,0,0.3);
        }
        
        .search-icon {
            color: #9aa0a6;
            font-size: 24px;
            margin-right: 12px;
            user-select: none;
        }
        
        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            font-size: 16px;
            font-weight: 400;
            color: #e8eaed;
            font-family: 'Google Sans', 'Roboto', Arial, sans-serif;
            padding: 12px 0;
        }
        
        .search-input::placeholder {
            color: #9aa0a6;
        }
        
        .button-group {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .md-button {
            background-color: #303134;
            border: 1px solid #5f6368;
            color: #e8eaed;
            font-family: 'Google Sans', 'Roboto', sans-serif;
            font-size: 14px;
            font-weight: 500;
            padding: 10px 20px;
            border-radius: 22px;
            cursor: pointer;
            transition: background-color 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .md-button:hover {
            background-color: #3c4043;
            border-color: #5f6368;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        
        .sites-section {
            margin: 24px 0 16px;
            text-align: center;
            width: 100%;
        }
        
        .section-label {
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.25px;
            color: #9aa0a6;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        
        .chip-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .site-chip {
            background: #303134;
            border-radius: 30px;
            padding: 8px 18px;
            font-size: 14px;
            font-weight: 500;
            font-family: 'Google Sans', 'Roboto', sans-serif;
            color: #e8eaed;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s, transform 0.1s;
            border: 1px solid #5f6368;
        }
        
        .site-chip:hover {
            background-color: #3c4043;
            border-color: #8ab4f8;
        }
        
        .site-custom-icon {
            width: 20px;
            height: 20px;
            object-fit: contain;
            border-radius: 4px;
        }
        
        .material-symbols-outlined {
            font-size: 18px;
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 20;
        }
        
        /* 右上角音乐按钮 */
        .music-toggle-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background-color: #303134;
            border: 1px solid #5f6368;
            color: #e8eaed;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            z-index: 1000;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        
        .music-toggle-btn.playing {
            border-color: #8ab4f8;
            box-shadow: 0 0 12px rgba(138, 180, 248, 0.3);
            animation: pulse 1.5s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(138, 180, 248, 0.4); }
            70% { box-shadow: 0 0 0 8px rgba(138, 180, 248, 0); }
            100% { box-shadow: 0 0 0 0 rgba(138, 180, 248, 0); }
        }
        
        /* 设置按钮 - 位于右上角音乐按钮左侧 */
        .settings-btn {
            position: fixed;
            top: 20px;
            right: 88px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background-color: #303134;
            border: 1px solid #5f6368;
            color: #e8eaed;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            z-index: 1000;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        
        .settings-btn:hover, .music-toggle-btn:hover {
            background-color: #3c4043;
            border-color: #8ab4f8;
            transform: scale(1.05);
        }
        
        /* 设置弹窗 Modal */
        .settings-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.2s, opacity 0.2s;
        }
        
        .settings-modal.active {
            visibility: visible;
            opacity: 1;
        }
        
        .modal-card {
            background: #303134;
            border-radius: 28px;
            width: 90%;
            max-width: 460px;
            padding: 28px 24px;
            border: 1px solid #5f6368;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: modalPop 0.25s ease;
        }
        
        @keyframes modalPop {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        .modal-title {
            font-size: 22px;
            font-weight: 500;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #e8eaed;
        }
        
        .modal-input-group {
            margin-bottom: 24px;
        }
        
        .modal-input-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: #9aa0a6;
        }
        
        .modal-input {
            width: 100%;
            background: #202124;
            border: 1px solid #5f6368;
            border-radius: 24px;
            padding: 12px 18px;
            font-size: 14px;
            color: #e8eaed;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }
        
        .modal-input:focus {
            border-color: #8ab4f8;
        }
        
        .preview-area {
            margin: 20px 0;
            background: #202124;
            border-radius: 16px;
            padding: 12px;
            text-align: center;
        }
        
        .preview-label {
            font-size: 12px;
            color: #9aa0a6;
            margin-bottom: 8px;
        }
        
        .bg-preview {
            width: 100%;
            height: 100px;
            border-radius: 12px;
            background-size: cover;
            background-position: center;
            background-color: #202124;
            border: 1px solid #5f6368;
        }
        
        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 20px;
        }
        
        .modal-btn {
            padding: 8px 20px;
            border-radius: 24px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            font-family: inherit;
            font-size: 14px;
            transition: background 0.2s;
        }
        
        .modal-btn-primary {
            background: #8ab4f8;
            color: #202124;
        }
        
        .modal-btn-primary:hover {
            background: #aecbfa;
        }
        
        .modal-btn-secondary {
            background: #3c4043;
            color: #e8eaed;
        }
        
        .modal-btn-secondary:hover {
            background: #4a4e52;
        }
        
        .footer {
            width: 100%;
            background-color: #171717cc;
            border-top: 1px solid #3c4043;
            padding: 16px 24px;
            font-size: 12px;
            color: #9aa0a6;
            text-align: center;
            margin-top: 40px;
            /* 移除footer的模糊滤镜，保持壁纸清晰 */
        }
        
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 28px;
            flex-wrap: wrap;
        }
        
        .footer-links a {
            color: #9aa0a6;
            text-decoration: none;
            font-size: 12px;
            font-weight: 500;
        }
        
        .footer-links a:hover {
            text-decoration: underline;
            color: #8ab4f8;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px);}
            to { opacity: 1; transform: translateY(0);}
        }
        
        @media (max-width: 600px) {
            .google-logo { width: 180px; margin-top: 15%; }
            .search-box { width: 90%; }
            .settings-btn { top: 12px; right: 70px; width: 42px; height: 42px; }
            .music-toggle-btn { top: 12px; right: 12px; width: 42px; height: 42px; }
            .splash-logo { width: 150px; height: 150px; }
        }
    </style>
</head>

<!-- 设置弹窗 Modal -->
<div id="settingsModal" class="settings-modal">
    <div class="modal-card">
        <div class="modal-title">
            <span class="material-symbols-outlined">wallpaper</span>
            自定义背景
        </div>
        <div class="modal-input-group">
            <label>背景图片 URL</label>
            <input type="text" id="bgUrlInput" class="modal-input" placeholder="输入图片地址 https://...">
            <div style="font-size: 12px; color: #9aa0a6; margin-top: 8px;">✨ 推荐使用高清原图链接，壁纸将保持原始清晰度</div>
        </div>
        <div class="preview-area">
            <div class="preview-label">预览效果</div>
            <div id="bgPreview" class="bg-preview" style="background-image: none;"></div>
        </div>
        <div class="modal-buttons">
            <button id="applyBgBtn" class="modal-btn modal-btn-primary">应用背景</button>
            <button id="closeModalBtn" class="modal-btn modal-btn-secondary">取消</button>
        </div>
    </div>
</div>

<audio id="bgAudio" loop preload="auto" style="display: none;">
    <source src="https://qins.ccccocccc.cc/view.php/3f45b9378bd4e5733940f2ac2f89182e.mp3" type="audio/mpeg">
</audio>

<script>
    // 启动封面逻辑: 停留2秒后淡出并显示主内容
    const splash = document.getElementById('splashScreen');
    const mainContent = document.getElementById('mainContent');
    
    setTimeout(() => {
        splash.style.opacity = '0';
        splash.style.visibility = 'hidden';
        mainContent.classList.add('visible');
        setTimeout(() => {
            splash.style.display = 'none';
        }, 500);
    }, 2000);
    
    // 背景管理 - 高清无模糊
    const dynamicBg = document.getElementById('dynamicBg');
    let currentBgUrl = localStorage.getItem('customBgUrl') || '';
    if (currentBgUrl) {
        dynamicBg.style.backgroundImage = `url("${currentBgUrl}")`;
    }
    
    // 设置弹窗元素
    const modal = document.getElementById('settingsModal');
    const settingsBtn = document.getElementById('settingsBtn');
    const footerSettingsLink = document.getElementById('footerSettingsLink');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const applyBgBtn = document.getElementById('applyBgBtn');
    const bgUrlInput = document.getElementById('bgUrlInput');
    const bgPreview = document.getElementById('bgPreview');
    
    function openModal() {
        modal.classList.add('active');
        bgUrlInput.value = currentBgUrl;
        updatePreview(currentBgUrl);
    }
    function closeModal() {
        modal.classList.remove('active');
    }
    
    settingsBtn.addEventListener('click', openModal);
    if (footerSettingsLink) footerSettingsLink.addEventListener('click', (e) => { e.preventDefault(); openModal(); });
    closeModalBtn.addEventListener('click', closeModal);
    modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
    
    function updatePreview(url) {
        if (url && url.trim() !== '') {
            bgPreview.style.backgroundImage = `url("${url}")`;
            bgPreview.style.backgroundSize = 'cover';
            bgPreview.style.backgroundPosition = 'center';
        } else {
            bgPreview.style.backgroundImage = 'none';
            bgPreview.style.backgroundColor = '#202124';
        }
    }
    
    bgUrlInput.addEventListener('input', (e) => {
        updatePreview(e.target.value);
    });
    
    // 应用背景 - 直接使用原图，不添加任何模糊效果
    applyBgBtn.addEventListener('click', () => {
        let newUrl = bgUrlInput.value.trim();
        if (newUrl) {
            dynamicBg.style.backgroundImage = `url("${newUrl}")`;
            currentBgUrl = newUrl;
            localStorage.setItem('customBgUrl', newUrl);
        } else {
            dynamicBg.style.backgroundImage = 'none';
            currentBgUrl = '';
            localStorage.removeItem('customBgUrl');
        }
        closeModal();
    });
    
    // 音乐控制
    const audioElement = document.getElementById('bgAudio');
    const musicBtn = document.getElementById('musicToggleBtn');
    const musicIconSpan = musicBtn.querySelector('.material-symbols-outlined');
    let isPlaying = false;
    
    function updateMusicUI() {
        if (isPlaying) {
            musicIconSpan.textContent = 'pause_circle';
            musicBtn.classList.add('playing');
        } else {
            musicIconSpan.textContent = 'play_circle';
            musicBtn.classList.remove('playing');
        }
    }
    
    function playMusic() {
        if (!audioElement) return;
        audioElement.play().then(() => {
            isPlaying = true;
            updateMusicUI();
        }).catch(() => {});
    }
    function pauseMusic() {
        audioElement.pause();
        isPlaying = false;
        updateMusicUI();
    }
    function toggleMusic() {
        if (isPlaying) pauseMusic();
        else playMusic();
    }
    musicBtn.addEventListener('click', toggleMusic);
    audioElement.addEventListener('ended', () => { if (isPlaying && audioElement.loop === false) playMusic(); });
    audioElement.pause();
    isPlaying = false;
    updateMusicUI();
    
    // 手气不错与搜索表单逻辑
    const searchForm = document.getElementById('searchForm');
    const searchInput = document.querySelector('.search-input');
    const luckyBtn = document.getElementById('luckyBtn');
    
    luckyBtn.addEventListener('click', (e) => {
        e.preventDefault();
        const keywords = ["Google Material Design", "Open source intelligence", "Web development trends", "Internet privacy", "Google fonts", "Startpage privacy", "Artificial Intelligence", "Space exploration", "Quantum computing"];
        searchInput.value = keywords[Math.floor(Math.random() * keywords.length)];
        searchForm.submit();
    });
    
    searchForm.addEventListener('submit', (event) => {
        if (searchInput.value.trim() === "") {
            event.preventDefault();
            searchInput.style.borderBottom = "1px solid #f28b82";
            searchInput.placeholder = "请输入搜索内容";
            setTimeout(() => {
                searchInput.style.borderBottom = "";
                searchInput.placeholder = "在 Google 中搜索";
            }, 1500);
        }
    });
    
    // 处理图片加载失败降级
    document.querySelectorAll('.site-chip img').forEach(img => {
        img.addEventListener('error', function() {
            this.style.display = 'none';
            const sibling = this.nextElementSibling;
            if (sibling && sibling.classList.contains('material-symbols-outlined')) sibling.style.display = 'inline-flex';
        });
        if (img.complete && img.naturalWidth === 0) img.dispatchEvent(new Event('error'));
    });
    
    // logo 容错
    const googleLogo = document.querySelector('.google-logo');
    if (googleLogo) googleLogo.addEventListener('error', () => { if (!googleLogo.src.includes('googlelogo_dark_color')) googleLogo.src = 'https://www.google.com/images/branding/googlelogo/2x/googlelogo_dark_color_272x92dp.png'; });
    
    // 调整布局
    function adjustLayout() {
        const logo = document.querySelector('.google-logo');
        if (logo) {
            if (window.innerWidth <= 600) logo.style.marginTop = '10%';
            else logo.style.marginTop = '20%';
        }
    }
    window.addEventListener('resize', adjustLayout);
    adjustLayout();
</script>
</body>
