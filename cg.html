<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>cloudroid云游戏</title>
    <!-- Google Material Symbols (辅助UI) + 原始游戏图标保留 -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0,1" />
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: grey;
            font-family: 'Google Sans', 'Roboto', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Material 游戏大厅卡片 */
        .game-hall {
            max-width: 1500px;
 height: 500px;
            width: 100%;
            background:black;
            max-width: 1500px;
            border-radius: 2px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.06);
            backdrop-filter: blur(2px);
            padding: 28px 24px 36px;
            transition: all 0.2s ease;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .header h1 {
            font-size: 1.9rem;
            font-weight: 500;
            background: linear-gradient(135deg, #e0e0ff, #b7b0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 500, 'GRAD' 0, 'opsz' 24;
        }

        .sub {
            color: #9aa2b8;
            font-size: 0.9rem;
            margin-bottom: 32px;
            border-left: 3px solid #8c7aff;
            padding-left: 16px;
            font-weight: 400;
        }

        /* 游戏网格 */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 24px 20px;
            margin-bottom: 16px;
        }

        .game-card {
            background: #262636;
            border-radius: 28px;
            padding: 20px 12px 18px;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1), background 0.2s, box-shadow 0.2s;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .game-card:hover {
            transform: translateY(-5px);
            background: #323248;
            box-shadow: 0 14px 22px -10px rgba(0,0,0,0.5);
        }

        .game-card:active {
            transform: scale(0.97);
        }

        /* 游戏图标 - 保留原始图片 */
        .game-icon {
            width: 88px;
            height: 88px;
            margin: 0 auto 14px;
            background: #1e1e2e;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
            background: #20202e;
        }

        .game-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 20px;
        }

        .game-name {
            font-weight: 500;
            font-size: 1.05rem;
            color: #f0f0fc;
            margin-bottom: 6px;
        }

        .badge {
            font-size: 0.7rem;
            background: #7c6eff30;
            color: #cbc3ff;
            padding: 4px 12px;
            border-radius: 40px;
            display: inline-block;
        }

        /* 全屏黑底终端（无进度条，纯文本，速度1-2秒/条）*/
        .terminal-overlay {
            position: fixed;
            top: 0;
            left: 40;
            width: 100%;
            height: 100%;
            background: #000000;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Roboto Mono', 'Courier New', monospace;
            overflow-y: auto;
            padding: 24px;
        }

        .terminal-content {
            width: 100%;
            max-width: 780px;
            background: green;
            color: white;
            text-shadow: 0 0 1px #0f0;
            font-size: 1.05rem;
            line-height: 1.55;
            white-space: pre-wrap;
            word-break: break-word;
            position: relative;
        }

        .terminal-line {
            margin-bottom: 10px;
            border-left: 2px solid #0f0;
            padding-left: 14px;
            animation: fadeIn 0.1s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(8px);}
            to { opacity: 1; transform: translateX(0);}
        }

        /* 全屏启动图容器 */
        .fullscreen-boot {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 2050;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .fullscreen-boot img {
            min-width: 100%;
            min-height: 100%;
            object-fit: cover;
            object-position: center;
        }
        
        /* 弹窗覆盖在全屏启动图之上 */
        .overlay-dialog {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(6px);
            z-index: 2100;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Google Sans', system-ui;
            animation: fadeInDialog 0.2s ease;
        }
        
        .dialog-card {
            background: #CCA8A1;
            border-radius: 32px;
            border: 1px solid #ffb347;
            padding: 28px 32px;
            max-width: 340px;
            width: 80%;
            text-align: center;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
            color: white;
        }
        
        .dialog-card .material-symbols-outlined {
            font-size: 48px;
            color: white;
            margin-bottom: 12px;
        }
        
        .dialog-card h3 {
            font-size: 1.5rem;
            margin: 12px 0 8px;
            font-weight: 500;
        }
        
        .dialog-card p {
            color: white;
            margin: 16px 0 24px;
            line-height: 1.4;
        }
        
        .dialog-card button {
            background: #5f4c2b;
            border: none;
            color: #ffe0a3;
            font-family: 'Google Sans', monospace;
            padding: 10px 28px;
            border-radius: 48px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.1s;
        }
        
        .dialog-card button:hover {
            background: #7f6438;
            transform: scale(1.02);
        }
        
        @keyframes fadeInDialog {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 输入行样式 - 透明无边框 */
        .input-line {
            display: flex;
            align-items: center;
            margin: 16px 0;
            gap: 12px;
            flex-wrap: wrap;
        }
        .input-prompt {
            color: #0f0;
            font-family: 'Roboto Mono', monospace;
            font-size: 1rem;
        }
        .input-field {
            background: transparent;
            border: none;
            color: #0f0;
            font-family: 'Roboto Mono', monospace;
            font-size: 1rem;
            padding: 4px 0;
            outline: none;
            width: 60px;
            text-align: left;
            border-bottom: 1px dashed #0f0;  /* 极细虚线，若完全无边框可改为none，但保留极简光标可见 */
            caret-color: #0f0;
        }
        .input-field:focus {
            border-bottom-color: #0f0;
            outline: none;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 560px) {
            .games-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 16px;
            }
            .game-icon {
                width: 72px;
                height: 72px;
            }
        }
    </style>
</head>
<body>

<div class="game-hall" id="gameHall">
    <div class="header">
        <h1>
            <span class="material-symbols-outlined">cloud_queue</span> 
            CloudDroid
        </h1>
        <span class="material-symbols-outlined" style="color:#8c7aff;">android</span>
    </div>
    <div class="sub">安卓 云游戏</div>
    <div class="games-grid" id="gamesContainer"></div>
    <div style="margin-top: 28px; text-align: center; font-size: 12px; color: #6a6f82;">
        <span class="material-symbols-outlined" style="font-size: 14px; vertical-align: middle;">power_settings_new</span> 点击游戏启动,需要下载系统包
    </div>
</div>

<!-- 全屏终端黑屏区域 (用于显示下载/解压等命令行) -->
<div id="terminalRoot" class="terminal-overlay hidden">
    <div class="terminal-content" id="terminalContent">
        <!-- 动态填充模拟命令行 -->
    </div>
</div>

<script>
    // ----------------------------- 游戏列表 (保留原始图片图标) -------------------------
    const games = [
        { name: "三角洲行动", img: "https://is1-ssl.mzstatic.com/image/thumb/Purple221/v4/c4/c9/6c/c4c96c62-04d6-c1f6-edf6-5d6693ea748f/AppIcon-1x_U007emarketing-0-8-0-85-220-0.png/200x200ia-75.webp" },
        { name: "原神", img: "https://is1-ssl.mzstatic.com/image/thumb/Purple211/v4/e5/23/5e/e5235e03-87b9-0d48-b36c-abd51fa03140/AppIcon-0-0-1x_U007epad-0-1-85-220.png/200x200ia-75.webp" },
        { name: "和平精英", img: "https://is1-ssl.mzstatic.com/image/thumb/Purple221/v4/16/71/27/1671279a-1daa-fc38-ea1a-e95f6ef410bf/AppIcon-1x_U007emarketing-0-10-0-85-220-0.png/200x200ia-75.webp" },
        { name: "蛋仔派对", img: "https://is1-ssl.mzstatic.com/image/thumb/PurpleSource221/v4/cc/f9/4b/ccf94bfc-6206-197d-c0d1-467500130f48/Placeholder.mill/200x200bb-75.webp" },
        { name: "我的世界", img: "https://is1-ssl.mzstatic.com/image/thumb/Purple221/v4/b1/38/5a/b1385a0f-6c97-dd64-472d-fea56831dfc5/AppIcon-0-0-1x_U007emarketing-0-11-0-0-85-220.png/200x200ia-75.webp" }
    ];

    // 渲染大厅，保留原始游戏图标
    const gamesContainer = document.getElementById('gamesContainer');
    function renderGameHall() {
        gamesContainer.innerHTML = '';
        games.forEach(game => {
            const card = document.createElement('div');
            card.className = 'game-card';
            card.setAttribute('data-game', game.name);
            card.innerHTML = `
                <div class="game-icon">
                    <img src="${game.img}" alt="${game.name}" loading="lazy" onerror="this.src='https://placehold.co/200x200?text=Game'">
                </div>
                <div class="game-name">${game.name}</div>
                <div class="badge">云玩</div>
            `;
            card.addEventListener('click', (e) => {
                e.stopPropagation();
                startVmBootSequence(game.name);
            });
            gamesContainer.appendChild(card);
        });
    }

    // 全局终端控制
    let isTerminalActive = false;
    let cancelBoot = false;
    let activeDialog = null;        // 当前弹窗
    let activeFullscreenBoot = null; // 全屏启动图层
    
    const terminalRoot = document.getElementById('terminalRoot');
    const terminalContentDiv = document.getElementById('terminalContent');

    // 辅助：清空终端内容
    function clearTerminalScreen() {
        if (terminalContentDiv) terminalContentDiv.innerHTML = '';
    }

    // 添加一行文本 (绿字)
    function appendLine(text, isError = false) {
        const line = document.createElement('div');
        line.className = 'terminal-line';
        line.style.color = isError ? '#f77' : '#0f0';
        line.style.borderLeftColor = isError ? '#f77' : '#0f0';
        line.textContent = text;
        terminalContentDiv.appendChild(line);
        // 自动滚动到底部
        terminalRoot.scrollTo({ top: terminalRoot.scrollHeight, behavior: 'smooth' });
    }

    // 核心: 等待函数 1~2秒随机 (单位: 毫秒)
    function waitRandomSegment() {
        const minSec = 0.01;
        const maxSec = 0.02;
        const ms = (Math.random() * (maxSec - minSec) + minSec) * 1000;
        return new Promise(resolve => setTimeout(resolve, ms));
    }

    // 固定等待(秒) 
    function waitExactSeconds(seconds) {
        return new Promise(resolve => setTimeout(resolve, seconds * 1000));
    }

    // 模拟下载安卓系统 (无进度条，纯文本行，每条间隔1-2秒)
    async function simulateDownloadWithoutProgress() {
        appendLine("> 初始化容器...");
        await waitRandomSegment();
        
        const downloadSteps = [
            "正在下载安卓系统镜像... [1MB/0.9GB]",
            "正在下载安卓系统镜像... [4MB/0.9GB]",
            "正在下载安卓系统镜像... [11MB/0.9GB]",
            "正在下载安卓系统镜像... [23MB/0.9GB]",
            "正在下载安卓系统镜像... [33MB/0.9GB]",
            "正在下载安卓系统镜像... [58MB/0.9GB]",
            "正在下载安卓系统镜像... [79MB/0.9GB]",
            "正在下载安卓系统镜像... [112MB/0.9GB]",
            "正在下载安卓系统镜像... [154MB/0.9GB]",
            "正在下载安卓系统镜像... [203MB/0.9GB]",
            "正在下载安卓系统镜像... [267MB/0.9GB]",
            "正在下载安卓系统镜像... [311MB/0.9GB]",
            "正在下载安卓系统镜像... [378MB/0.9GB]",
            "正在下载安卓系统镜像... [422MB/0.9GB]",
            "正在下载安卓系统镜像... [489MB/0.9GB]",
            "正在下载安卓系统镜像... [544MB/0.9GB]",
            "正在下载安卓系统镜像... [601MB/0.9GB]",
            "正在下载安卓系统镜像... [672MB/0.9GB]",
            "正在下载安卓系统镜像... [734MB/0.9GB]",
            "正在下载安卓系统镜像... [798MB/0.9GB]",
            "正在下载安卓系统镜像... [855MB/0.9GB]",
            "正在下载安卓系统镜像... [899MB/0.9GB]"
        ];
        
        for (const stepMsg of downloadSteps) {
            if (cancelBoot) return false;
            appendLine(stepMsg);
            await waitRandomSegment();  // 每行1~2秒
        }
        appendLine("✅ 镜像校验通过，哈希匹配");
        await waitRandomSegment();
        return true;
    }

    // 清屏 + 解压动画 (显示一系列数字解压百分比，每条1-2秒)
    async function simulateUnzipSequence() {
        clearTerminalScreen();
        appendLine("> 解压系统分区 ...");
        await waitRandomSegment();
        
        const unzipValues = ["1", "4", "12", "23", "25", "35", "35.5", "38", "42", "45", "55", "78", "91", "99", "100"];
        for (let val of unzipValues) {
            if (cancelBoot) return false;
            appendLine(`解压... ${val}%`);
            await waitRandomSegment();
        }
        appendLine("✓ 解压完成，挂载 system.img");
        await waitRandomSegment();
        return true;
    }

    // 显示全屏居中弹窗 (覆盖在全屏启动图之上)
    function showDialogOverlay(title, message, confirmText = "确认") {
        return new Promise((resolve) => {
            if (activeDialog) {
                activeDialog.remove();
                activeDialog = null;
            }
            const dialogOverlay = document.createElement('div');
            dialogOverlay.className = 'overlay-dialog';
            dialogOverlay.innerHTML = `
                <div class="dialog-card">
                    <span class="material-symbols-outlined">warning</span>
                    <h3>${title}</h3>
                    <p>${message}</p>
                    <button id="dialogConfirmBtn">${confirmText}</button>
                </div>
            `;
            document.body.appendChild(dialogOverlay);
            activeDialog = dialogOverlay;
            
            const confirmBtn = dialogOverlay.querySelector('#dialogConfirmBtn');
            const cleanup = () => {
                if (activeDialog) activeDialog.remove();
                activeDialog = null;
                resolve();
            };
            confirmBtn.addEventListener('click', cleanup, { once: true });
        });
    }

    // 展示全屏启动图 (覆盖整个屏幕)
    async function showFullscreenBootImage() {
        if (activeFullscreenBoot) {
            activeFullscreenBoot.remove();
            activeFullscreenBoot = null;
        }
        const fullDiv = document.createElement('div');
        fullDiv.className = 'fullscreen-boot';
        const bootImageUrl = "https://pic3.zhimg.com/v2-c74013fb3e4e4da0490932cba06a60ee_1440w.jpg";
        const img = document.createElement('img');
        img.src = bootImageUrl;
        img.alt = "android boot fullscreen";
        fullDiv.appendChild(img);
        document.body.appendChild(fullDiv);
        activeFullscreenBoot = fullDiv;
        await new Promise(resolve => {
            if (img.complete) resolve();
            else img.onload = resolve;
        });
    }
    
    function removeFullscreenBootImage() {
        if (activeFullscreenBoot) {
            activeFullscreenBoot.remove();
            activeFullscreenBoot = null;
        }
    }

    // 新流程：启动好了先黑屏 -> 展示全屏启动图 -> 6秒后弹窗覆盖在启动图上
    async function showBootSequenceWithFullscreenAndDialog() {
        clearTerminalScreen();
        appendLine("> 引导加载程序启动...");
        await waitRandomSegment();
        appendLine("> 内核载入，初始化硬件抽象层");
        await waitRandomSegment();
        appendLine("> 系统就绪，进入图形模式");
        await waitRandomSegment();
        
        await showFullscreenBootImage();
        await waitExactSeconds(6);
        await showDialogOverlay("未知启动", "系统无法识别当前启动配置，可能导致应用异常。", "确认");
        removeFullscreenBootImage();
    }

    // 通过终端输入获取 Y/N (完全透明无边框输入框)
    async function getYNPrompt() {
        return new Promise((resolve) => {
            // 创建输入区域 - 透明无边框风格
            const inputContainer = document.createElement('div');
            inputContainer.className = 'input-line';
            inputContainer.innerHTML = `
                <span class="input-prompt">> 输入 y 或 n : </span>
                <input type="text" id="ynInput" class="input-field" maxlength="1" autocomplete="off" spellcheck="false">
            `;
            terminalContentDiv.appendChild(inputContainer);
            const inputEl = document.getElementById('ynInput');
            if (inputEl) {
                inputEl.focus();
                const handleInput = (e) => {
                    let val = e.target.value.trim().toLowerCase();
                    if (val === 'y' || val === 'n') {
                        inputEl.removeEventListener('keypress', handleKey);
                        inputEl.removeEventListener('input', handleInput);
                        inputContainer.remove();
                        resolve(val);
                    } else {
                        // 清空无效输入
                        e.target.value = '';
                    }
                };
                const handleKey = (e) => {
                    if (e.key === 'Enter') {
                        let val = e.target.value.trim().toLowerCase();
                        if (val === 'y' || val === 'n') {
                            inputEl.removeEventListener('keypress', handleKey);
                            inputEl.removeEventListener('input', handleInput);
                            inputContainer.remove();
                            resolve(val);
                        } else {
                            e.target.value = '';
                        }
                    }
                };
                inputEl.addEventListener('input', handleInput);
                inputEl.addEventListener('keypress', handleKey);
            } else {
                // fallback 但不会发生
                resolve('n');
            }
        });
    }

    // 系统引导错误 + 终端输入 y/n (透明无边框输入框)
    async function showSystemBootErrorAndChoice() {
        clearTerminalScreen();
        appendLine("******************************************************");
        appendLine("   ANDROID错误");
        appendLine("******************************************************");
        appendLine("");
        appendLine("SYSTEM_BOOT_ERROR: VFS unable to mount root fs");
        appendLine("");
        
        // 获取用户输入 y/n
        const userChoice = await getYNPrompt();
        
        if (userChoice === 'y') {
            appendLine("> 终止...");
            await waitRandomSegment();
            return 'exit';
        } else {
            appendLine("> 重新引导...");
            await waitRandomSegment();
            return 'reboot';
        }
    }

    // 二次重启流程：全屏启动图，6秒后弹窗覆盖，接着错误选择(终端输入)
    async function rebootShortSequence() {
        clearTerminalScreen();
        appendLine("重启......");
        await waitRandomSegment();
        appendLine("重新挂载 /system /data ...");
        await waitRandomSegment();
        
        await showFullscreenBootImage();
        await waitExactSeconds(6);
        await showDialogOverlay("未知启动", "异常启动", "确认");
        removeFullscreenBootImage();
        
        const bootChoiceAfterReboot = await showSystemBootErrorAndChoice();
        return bootChoiceAfterReboot;
    }

    // 主启动序列 (下载->解压->黑屏+全屏启动图->6秒后弹窗覆盖->错误选项(y/n输入))
    async function startVmBootSequence(gameName) {
        if (isTerminalActive) return;
        isTerminalActive = true;
        cancelBoot = false;
        
        document.getElementById('gameHall').classList.add('hidden');
        terminalRoot.classList.remove('hidden');
        clearTerminalScreen();
        
        appendLine(`> 云游戏实例启动: ${gameName}`);
        appendLine(`> 架构: arm64-v8a | RAM: 4GB | 安卓9`);
        await waitRandomSegment();
        
        try {
            const downloadSuccess = await simulateDownloadWithoutProgress();
            if (cancelBoot || !downloadSuccess) throw new Error("cancel");
            
            const unzipOk = await simulateUnzipSequence();
            if (cancelBoot || !unzipOk) throw new Error("cancel");
            
            await showBootSequenceWithFullscreenAndDialog();
            
            const bootChoice = await showSystemBootErrorAndChoice();
            
            if (bootChoice === 'exit') {
                appendLine("正在关闭...");
                await waitRandomSegment();
                closeTerminalAndReturnToHall();
            } 
            else if (bootChoice === 'reboot') {
                const rebootResult = await rebootShortSequence();
                if (rebootResult === 'exit') {
                    appendLine("强制终止，退回游戏大厅");
                    await waitRandomSegment();
                    closeTerminalAndReturnToHall();
                } else {
                    appendLine("失败");
                    await waitRandomSegment();
                    const finalChoice = await showSystemBootErrorAndChoice();
                    if (finalChoice === 'exit') {
                        closeTerminalAndReturnToHall();
                    } else {
                        appendLine("强制退出");
                        await waitRandomSegment();
                        closeTerminalAndReturnToHall();
                    }
                }
            }
        } catch (err) {
            if (!cancelBoot) {
                appendLine("崩溃", true);
                await waitRandomSegment();
            }
            closeTerminalAndReturnToHall();
        }
    }
    
    // 关闭终端回到大厅，清理所有图层
    function closeTerminalAndReturnToHall() {
        if (!isTerminalActive) return;
        cancelBoot = true;
        isTerminalActive = false;
        if (activeDialog) {
            activeDialog.remove();
            activeDialog = null;
        }
        removeFullscreenBootImage();
        terminalRoot.classList.add('hidden');
        document.getElementById('gameHall').classList.remove('hidden');
        clearTerminalScreen();
    }
    
    window.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && isTerminalActive && terminalRoot && !terminalRoot.classList.contains('hidden')) {
            closeTerminalAndReturnToHall();
        }
    });
    
    renderGameHall();
</script>
