<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>迈乐鸠觞凼 · 微信收款</title>
    <!-- Google Fonts 优雅引用 (Inter + 回退方案) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #e9eef3 0%, #dce3ec 100%);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
        }

        /* 主卡片容器 */
        .payment-card {
            max-width: 540px;
            width: 100%;
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25), 0 4px 12px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            transition: transform 0.25s ease, box-shadow 0.3s ease;
        }

        .payment-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 32px 55px -15px rgba(0, 0, 0, 0.3);
        }

        /* 头部装饰区域 - 微信绿风格 */
        .card-header {
            background: linear-gradient(135deg, #1aad19 0%, #2c9e2a 100%);
            padding: 1.8rem 1.8rem 1.5rem;
            text-align: center;
            color: white;
        }

        .wechat-icon {
            width: 56px;
            height: 56px;
            background: white;
            border-radius: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }

        .wechat-icon svg {
            width: 38px;
            height: 38px;
        }

        .card-header h1 {
            font-size: 1.9rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            margin-bottom: 0.25rem;
        }

        .merchant-name {
            font-size: 1.1rem;
            font-weight: 500;
            background:transparent;
            display: inline-block;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            backdrop-filter: blur(2px);
            margin-top: 0.5rem;
            letter-spacing: 1px;
        }

        /* 主体内容 */
        .card-body {
            padding: 2rem 1.8rem 2rem;
        }

        /* 固定金额展示区 — 无任何编辑控件 */
        .amount-section {
            background: #f8fafc;
            border-radius: 1.8rem;
            padding: 1.4rem 1rem;
            text-align: center;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(0,0,0,0.03);
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.02), 0 2px 4px rgba(0,0,0,0.02);
        }

        .amount-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            color: #5b6e8c;
            margin-bottom: 0.5rem;
        }

        .fixed-amount {
            font-size: 3.2rem;
            font-weight: 800;
            color: #1aad19;
            line-height: 1.1;
            font-family: 'Inter', monospace;
            background: linear-gradient(135deg, #1aad19, #0f7b0e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 2px 5px rgba(26,173,25,0.1);
        }

        .fixed-amount small {
            font-size: 1.3rem;
            font-weight: 700;
        }

        /* 收款码区域 */
        .qrcode-container {
            background: #ffffff;
            border-radius: 2rem;
            padding: 1.2rem;
            margin: 0.5rem 0 1rem;
            text-align: center;
            border: 1px solid #eef2f9;
            box-shadow: 0 12px 22px -12px rgba(0, 0, 0, 0.08);
        }

        .qrcode-wrapper {
            background: white;
            padding: 0.5rem;
            display: inline-block;
            border-radius: 28px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
        }

        .qrcode-image {
            width: 220px;
            height: 220px;
            display: block;
            margin: 0 auto;
            background: #f5f7fb;
            border-radius: 20px;
            object-fit: contain;
        }

        .qr-tip {
            margin-top: 0.8rem;
            font-size: 0.85rem;
            background: #eef9ee;
            display: inline-block;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            color: #1f6e1f;
            font-weight: 500;
        }

        /* 温馨提示 */
        .notice {
            background: #fff7e5;
            border-radius: 1.2rem;
            padding: 0.9rem 1.2rem;
            margin: 1rem 0 0.5rem;
            font-size: 0.8rem;
            color: #b87c00;
            display: flex;
            gap: 10px;
            align-items: center;
            border-left: 4px solid #f5b042;
        }

        .footer-info {
            margin-top: 1.2rem;
            text-align: center;
            font-size: 0.7rem;
            color: #8d9db0;
            border-top: 1px solid #edf2f7;
            padding-top: 1.2rem;
        }

        /* 商家信息额外强调 */
        .merchant-highlight {
            display: flex;
            justify-content: center;
            align-items: baseline;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 5px;
        }

        @media (max-width: 480px) {
            .card-body {
                padding: 1.5rem;
            }
            .qrcode-image {
                width: 180px;
                height: 180px;
            }
            .fixed-amount {
                font-size: 2.6rem;
            }
        }
    </style>
</head>

    // 可选：加载检测二维码图片的真实性，但不影响金额固定。
    const qrImage = document.getElementById('qrCodeImg');
    if (qrImage) {
        qrImage.onerror = function() {
            console.warn('[提示] 请将收款码图片替换为商家“迈乐鸠觞凼”的真实微信收款二维码。当前为示意图片。');
            // 为了更好的用户体验，如果真实图片加载失败，保留占位图（已有data:image后备），不干扰展示。
        };
    }
    
    // 确保无论任何外部操作，页面显示的金额始终为 1.09
    // 强化固定金额逻辑（避免可能的DOM篡改）
    const amountSpan = document.getElementById('fixedAmountValue');
    if (amountSpan) {
        // 锁定金额内容
        Object.defineProperty(amountSpan, 'innerText', {
            configurable: false,
            get: function() { return '1.09'; },
            set: function() { /* 禁止修改 */ }
        });
        Object.defineProperty(amountSpan, 'textContent', {
            configurable: false,
            get: function() { return '1.09'; },
            set: function() { /* 禁止修改 */ }
        });
        // 初始赋值确保
        amountSpan.innerText = '1.09';
    }
    
    // 额外防止控制台或者任何脚本意外修改金额相关容器（深度冻结展示区域）
    const amountSection = document.querySelector('.amount-section');
    if (amountSection) {
        // 阻止任何通过innerHTML等方式篡改金额显示的行为（防止注入）
        const observer = new MutationObserver((mutations) => {
            mutations.forEach((mutation) => {
                if (mutation.type === 'childList' || mutation.type === 'characterData') {
                    const currentAmountSpan = document.getElementById('fixedAmountValue');
                    if (currentAmountSpan && currentAmountSpan.innerText !== '1.09') {
                        currentAmountSpan.innerText = '1.09';
                    }
                    // 同时保证外围显示内容不被篡改金额数值文案
                    const amountDiv = document.querySelector('.fixed-amount');
                    if (amountDiv && !amountDiv.innerText.includes('1.09')) {
                        amountDiv.innerHTML = '¥ <span id="fixedAmountValue">1.09</span>';
                    }
                }
            });
        });
        observer.observe(amountSection, { childList: true, subtree: true, characterData: true });
